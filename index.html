<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hang Onyo!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #4a9fd4;
  --blue-dark: #2e7db5;
  --green: #4caf72;
  --red: #e05252;
  --yellow: #f7c948;
  --yellow-dark: #c9960a;
  --text: #3a3020;
  --text-light: #8a7a60;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --radius: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  background: #f0ede8 url('https://raw.githubusercontent.com/miyumiyu5095/hang-onyo/main/bg.png') center center / cover fixed;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 12px 40px;
  overflow-x: hidden;
}

/* ── MAIN ── */
.main {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 10px;
  gap: 0;
}

/* ── ONYO CHARACTER ── */
.onyo-scene {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-end;
}
.onyo-img {
  width: 280px;
  max-width: 72vw;
  /* multiply로 검정 배경 제거 */
  mix-blend-mode: multiply;
  animation: floatOnyo 3.2s ease-in-out infinite;
  transition: opacity 0.2s;
  user-select: none;
  pointer-events: none;
}
@keyframes floatOnyo {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-12px); }
}
.onyo-img.shake {
  animation: shakeAnim 0.45s ease both;
}
@keyframes shakeAnim {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-10px) rotate(-4deg)}
  40%{transform:translateX(10px) rotate(4deg)}
  60%{transform:translateX(-7px) rotate(-3deg)}
  80%{transform:translateX(7px) rotate(3deg)}
}
.onyo-img.bounce {
  animation: bounceAnim 0.55s ease both;
}
@keyframes bounceAnim {
  0%,100%{transform:translateY(0)}
  40%{transform:translateY(-22px)}
  70%{transform:translateY(-9px)}
}

/* ── GAME CARD ── */
.game-card {
  background: transparent;
  border-radius: 0;
  box-shadow: none;
  width: 100%;
  padding: 10px 18px 18px;
  backdrop-filter: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  isolation: isolate;
}

/* ── WORD DISPLAY ── */
.word-display {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  min-height: 55px;
  align-items: center;
}
.letter-slot {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.letter-char {
  font-family: 'Fredoka One', cursive;
  font-size: 1.7rem;
  color: var(--text);
  min-width: 24px;
  text-align: center;
  transition: transform 0.3s cubic-bezier(.68,-0.55,.27,1.55);
  transform: scale(0);
}
.letter-char.show       { transform: scale(1); }
.letter-char.blank      { color: transparent; transform: scale(1); min-height: 1.7rem; }
.letter-char.new-correct{ color: var(--green); animation: popL .42s ease forwards; }
.letter-char.wrong-reveal{ color: var(--red); animation: popL .42s ease forwards; }
@keyframes popL {
  0%{transform:scale(0) rotate(-12deg)}
  65%{transform:scale(1.4) rotate(5deg)}
  100%{transform:scale(1) rotate(0)}
}
.letter-line {
  width: 24px; height: 3px;
  background: #777770;
  border-radius: 2px;
  opacity: 0.8;
}

/* ── HINT ── */
.hint-section {
  width: 100%;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.btn-hint {
  background: var(--yellow); color: #111111;
  border: none; border-radius: 50px;
  padding: 9px 30px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem;
  cursor: pointer;
  box-shadow: 0 3px 0 var(--yellow-dark);
  transition: all .14s;
}
.btn-hint:hover  { transform: translateY(-2px); box-shadow: 0 5px 0 var(--yellow-dark); background: #f0b800; }
.btn-hint:active { transform: translateY(1px);  box-shadow: 0 2px 0 var(--yellow-dark); }
.hint-box {
  background: #fffbe8; border: 1.5px solid #e8d870;
  border-radius: 12px; padding: 9px 16px;
  font-size: .92rem; color: #7a6200; font-weight: 700;
  width: 100%; text-align: center;
  display: none; animation: fadeD .3s ease;
}
.hint-box.show { display: block; }
@keyframes fadeD {
  from{opacity:0;transform:translateY(-4px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── KEYBOARD ── */
.keyboard {
  width: 100%;
  display: flex; flex-direction: column; gap: 5px; align-items: center;
}
.key-row {
  display: flex; gap: 5px; justify-content: center; flex-wrap: wrap;
}
.key {
  width: 40px; height: 40px;
  border: none;
  background: url('https://raw.githubusercontent.com/miyumiyu5095/hang-onyo/main/key1.png') center/cover no-repeat;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .85rem;
  color: #111111;
  cursor: pointer;
  transition: transform .12s;
  display: flex; align-items: center; justify-content: center;
  box-shadow: none; outline: none;
  -webkit-appearance: none; appearance: none;
}
.key:hover:not(:disabled) {
  background: url('https://raw.githubusercontent.com/miyumiyu5095/hang-onyo/main/key4.png') center/cover no-repeat;
  color: #111111;
  transform: translateY(-1px);
}
.key:active:not(:disabled) { transform: translateY(1px); }
.key.correct {
  background: url('https://raw.githubusercontent.com/miyumiyu5095/hang-onyo/main/key3.png') center/cover no-repeat;
  color: #111111; cursor: default;
}
.key.wrong {
  background: url('https://raw.githubusercontent.com/miyumiyu5095/hang-onyo/main/key2.png') center/cover no-repeat;
  color: #111111; cursor: default;
}
.key:disabled { cursor: default; }

/* ── PLAY AGAIN ── */
.btn-play {
  background: var(--blue); color: white;
  border: none; border-radius: 50px;
  padding: 11px 36px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem;
  cursor: pointer;
  box-shadow: 0 4px 0 var(--blue-dark);
  transition: all .14s;
}
.btn-play:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 var(--blue-dark); background: var(--blue-dark); }
.btn-play:active { transform: translateY(2px);  box-shadow: 0 2px 0 var(--blue-dark); }

/* ── OVERLAY ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(60,50,40,0.35);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center; justify-content: center; padding: 16px;
}
.overlay.show { display: flex; }

.result-card {
  background: rgba(255,255,252,0.96);
  border-radius: 24px;
  padding: 28px 24px 24px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.22);
  animation: popCard .45s cubic-bezier(.68,-0.55,.27,1.55);
  max-width: 340px; width: 100%;
  border: 1px solid rgba(200,190,170,0.4);
}
@keyframes popCard {
  from{transform:scale(0.4) rotate(-5deg);opacity:0}
  to{transform:scale(1) rotate(0);opacity:1}
}

.result-onion {
  width: 110px; height: 120px;
  margin: 0 auto 10px;
  display: flex; align-items: center; justify-content: center;
}
.result-onion img {
  width: 110px;
  mix-blend-mode: multiply;
}

.result-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.9rem; margin-bottom: 6px;
}
.result-title.win  { color: var(--green); }
.result-title.lose { color: var(--red); }

.result-word-label { font-size: .82rem; color: var(--text-light); margin-bottom: 3px; }
.result-word-value {
  font-family: 'Fredoka One', cursive;
  font-size: 1.55rem; color: var(--blue-dark); margin-bottom: 3px;
}
.result-hint-text { font-size: .83rem; color: #bbb; font-style: italic; margin-bottom: 14px; }

/* Edit area */
.edit-area {
  background: #f8f6f0; border: 1.5px solid #ddd0bc;
  border-radius: 12px; padding: 12px 14px; margin-bottom: 12px;
  display: none; flex-direction: column; gap: 8px; text-align: left;
}
.edit-area.show { display: flex; }
.edit-label { font-size: .76rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .5px; }
.edit-input, .edit-hint-input {
  width: 100%; border: 1.5px solid #ddd0bc; border-radius: 9px;
  padding: 7px 11px; outline: none; transition: border-color .2s;
}
.edit-input { font-family: 'Fredoka One', cursive; font-size: 1.05rem; color: var(--text); }
.edit-hint-input { font-family: 'Nunito', sans-serif; font-size: .9rem; color: var(--text); }
.edit-input:focus, .edit-hint-input:focus { border-color: var(--blue); }
.edit-btns { display: flex; gap: 8px; }
.btn-save {
  flex: 1; background: var(--green); color: white; border: none;
  border-radius: 9px; padding: 8px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .86rem;
  cursor: pointer; transition: background .12s;
}
.btn-save:hover { background: #3a9060; }
.btn-del {
  flex: 1; background: var(--red); color: white; border: none;
  border-radius: 9px; padding: 8px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .86rem;
  cursor: pointer; transition: background .12s;
}
.btn-del:hover { background: #c03030; }

.result-btns { display: flex; gap: 9px; justify-content: center; flex-wrap: wrap; }
.btn-next {
  background: var(--blue); color: white; border: none;
  border-radius: 50px; padding: 11px 28px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem;
  cursor: pointer; box-shadow: 0 4px 0 var(--blue-dark); transition: all .13s;
}
.btn-next:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 var(--blue-dark); background: var(--blue-dark); }
.btn-next:active { transform: translateY(2px);  box-shadow: 0 2px 0 var(--blue-dark); }
.btn-edit-word {
  background: #f0ede6; color: var(--text-light);
  border: 1.5px solid #d8d0c0; border-radius: 50px;
  padding: 9px 18px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .86rem;
  cursor: pointer; transition: all .13s;
}
.btn-edit-word:hover { background: #e0ddd6; color: var(--text); border-color: #b0a890; }

/* ── DOWNLOAD BANNER ── */
.dl-banner {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%) translateY(130px);
  background: #3a3020; color: #f5f0e8;
  border-radius: 16px; padding: 12px 20px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 6px 28px rgba(0,0,0,0.25);
  z-index: 300;
  transition: transform .4s cubic-bezier(.68,-0.55,.27,1.55);
  white-space: nowrap; font-weight: 700; font-size: .9rem;
}
.dl-banner.show { transform: translateX(-50%) translateY(0); }
.btn-dl {
  background: var(--yellow); color: #6b4e00; border: none;
  border-radius: 9px; padding: 7px 14px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .83rem;
  cursor: pointer; transition: background .12s;
}
.btn-dl:hover { background: #f0b800; }
.btn-dl-x {
  background: none; border: none; color: #9a8a70;
  font-size: 1.1rem; cursor: pointer; padding: 0 3px; line-height: 1;
}

/* Responsive */
@media(max-width:440px){
  .onyo-img { width: 240px; }
  .game-card { padding: 16px 12px 14px; gap: 11px; }
  .letter-char { font-size: 1.45rem; min-width: 20px; }
  .letter-line { width: 20px; }
  .key { width: 31px; height: 34px; font-size: .78rem; }
}
@media(max-width:360px){
  .key { width: 27px; height: 30px; font-size: .7rem; border-radius: 7px; }
  .onyo-img { width: 200px; }
}
</style>
</head>
<body>

<div class="main">

  <!-- ONYO 캐릭터 -->
  <div class="onyo-scene">
    <img class="onyo-img" id="onyoImg" src="https://raw.githubusercontent.com/miyumiyu5095/hang-onyo/main/00.png" alt="Onyo">
  </div>

  <!-- 게임 카드 -->
  <div class="game-card">

    <!-- 단어 -->
    <div class="word-display" id="wordDisplay"></div>

    <!-- 힌트 -->
    <div class="hint-section">
      <button class="btn-hint" onclick="showHint()">💡 Hint</button>
      <div class="hint-box" id="hintBox"></div>
    </div>

    <!-- 키보드 -->
    <div class="keyboard" id="keyboard"></div>

    <!-- 다시하기 -->
    <button class="btn-play" onclick="newGame()">▶ Play Again</button>
  </div>
</div>

<!-- 결과 팝업 -->
<div class="overlay" id="overlay">
  <div class="result-card">

    <div class="result-onion">
      <img id="resultImg" src="https://raw.githubusercontent.com/miyumiyu5095/hang-onyo/main/00.png" alt="Onyo">
    </div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-word-label">The word was</div>
    <div class="result-word-value" id="resultWord"></div>
    <div class="result-hint-text" id="resultHint"></div>

    <!-- 편집 영역 -->
    <div class="edit-area" id="editArea">
      <div class="edit-label">✏️ Edit Word</div>
      <input class="edit-input" id="editWordInput" type="text">
      <div class="edit-label">💡 Edit Hint</div>
      <input class="edit-hint-input" id="editHintInput" type="text">
      <div class="edit-btns">
        <button class="btn-save" onclick="saveEdit()">✅ Save</button>
        <button class="btn-del"  onclick="deleteWord()">🗑 Delete</button>
      </div>
    </div>

    <div class="result-btns">
      <button class="btn-next" onclick="nextGame()">▶ Next</button>
      <button class="btn-edit-word" id="btnEditToggle" onclick="toggleEdit()">✏️ Edit Word</button>
    </div>
  </div>
</div>

<!-- 다운로드 배너 -->
<div class="dl-banner" id="dlBanner">
  <span>📝 words.json updated!</span>
  <button class="btn-dl" onclick="downloadJSON()">⬇ Download</button>
  <button class="btn-dl-x" onclick="hideBanner()">✕</button>
</div>

<script>
const MAX_WRONG = 8;  // 00~08 = 9장, 기회 8번

// ── 상태 ──
let words = [], currentWord = '', currentHint = '';
let currentIndex = -1, guessed = new Set(), wrong = 0, editMode = false;

// ── 단어 로드 ──
async function loadWords() {
  try {
    const r = await fetch('words.json');
    words = await r.json();
  } catch {
    words = [
      {word:'challenge', hint:'people love doing this on TikTok'},
      {word:'knowledge',  hint:'school helps you build this'},
      {word:'motivation', hint:'reason to act'},
      {word:'imagination',hint:'kids use this a lot'},
      {word:'strategy',   hint:'gamers plan this before winning'},
    ];
  }
  newGame(true);
}

// ── 새 게임 ──
function newGame(skipConfirm = false) {
  if (!skipConfirm && guessed.size > 0 && wrong < MAX_WRONG && !isWon()) {
    if (!confirm('지금 포기하고 새 단어로 넘어갈까요?')) return;
  }
  closeOverlay();
  wrong = 0; guessed = new Set(); editMode = false;

  let idx;
  do { idx = Math.floor(Math.random() * words.length); }
  while (words.length > 1 && idx === currentIndex);
  currentIndex = idx;
  currentWord = words[idx].word.toLowerCase();
  currentHint = words[idx].hint;

  document.getElementById('hintBox').textContent = '';
  document.getElementById('hintBox').classList.remove('show');

  updateOnion(0);
  renderWord();
  renderKeyboard();
}

function nextGame() { newGame(true); }

// ── 캐릭터 이미지 교체 ──
function updateOnion(step) {
  const n = String(step).padStart(2, '0');
  document.getElementById('onyoImg').src = `https://raw.githubusercontent.com/miyumiyu5095/hang-onyo/main/${n}.png`;
}

function animateOnion(cls) {
  const el = document.getElementById('onyoImg');
  el.classList.remove('shake', 'bounce');
  void el.offsetWidth;
  el.classList.add(cls);
  el.addEventListener('animationend', () => el.classList.remove(cls), {once: true});
}

// ── 단어 렌더 ──
function renderWord(newLetter = null) {
  const el = document.getElementById('wordDisplay');
  el.innerHTML = '';
  for (const ch of currentWord) {
    const slot = document.createElement('span'); slot.className = 'letter-slot';
    const c    = document.createElement('span'); c.className = 'letter-char';
    if (guessed.has(ch)) {
      c.textContent = ch;
      c.classList.add(ch === newLetter ? 'new-correct' : 'show');
    } else {
      c.textContent = '';
      c.classList.add('blank');
    }
    const line = document.createElement('span'); line.className = 'letter-line';
    slot.appendChild(c); slot.appendChild(line); el.appendChild(slot);
  }
}

function revealAll() {
  const el = document.getElementById('wordDisplay'); el.innerHTML = '';
  for (const ch of currentWord) {
    const slot = document.createElement('span'); slot.className = 'letter-slot';
    const c = document.createElement('span');
    c.className = 'letter-char ' + (guessed.has(ch) ? 'show' : 'wrong-reveal');
    c.textContent = ch;
    const line = document.createElement('span'); line.className = 'letter-line';
    slot.appendChild(c); slot.appendChild(line); el.appendChild(slot);
  }
}

// ── 키보드 ──
function renderKeyboard() {
  const kb = document.getElementById('keyboard'); kb.innerHTML = '';
  const rows = ['aeiou', 'bcdfg', 'hjklm', 'npqrs', 'tvwxyz'];
  rows.forEach(row => {
    const rowEl = document.createElement('div'); rowEl.className = 'key-row';
    for (const ch of row) {
      const btn = document.createElement('button');
      btn.className = 'key'; btn.id = `key-${ch}`; btn.textContent = ch;
      btn.addEventListener('click', () => guess(ch));
      rowEl.appendChild(btn);
    }
    kb.appendChild(rowEl);
  });
}

// ── 추측 ──
function guess(ch) {
  if (guessed.has(ch)) return;
  guessed.add(ch);
  const k = document.getElementById(`key-${ch}`);
  if (k) k.disabled = true;

  if (currentWord.includes(ch)) {
    k && k.classList.add('correct');
    renderWord(ch);
    animateOnion('bounce');
    if (isWon()) setTimeout(() => showResult(true), 600);
  } else {
    k && k.classList.add('wrong');
    wrong++;
    animateOnion('shake');
    updateOnion(wrong);  // 00→01→...→08
    if (wrong >= MAX_WRONG) {
      setTimeout(() => { revealAll(); showResult(false); }, 600);
    }
  }
}

// 키보드 단축키
document.addEventListener('keydown', e => {
  const ch = e.key.toLowerCase();
  if (/^[a-z]$/.test(ch) && !guessed.has(ch)) {
    const k = document.getElementById(`key-${ch}`);
    if (k && !k.disabled) guess(ch);
  }
});

function isWon() { return [...currentWord].every(ch => guessed.has(ch)); }

// ── 힌트 ──
function showHint() {
  const b = document.getElementById('hintBox');
  b.textContent = '💡 ' + currentHint;
  b.classList.add('show');
}

// ── 결과 팝업 ──
function showResult(won) {
  const imgSrc = won ? 'https://raw.githubusercontent.com/miyumiyu5095/hang-onyo/main/00.png' : 'https://raw.githubusercontent.com/miyumiyu5095/hang-onyo/main/08.png';
  document.getElementById('resultImg').src = imgSrc;

  const t = document.getElementById('resultTitle');
  t.textContent = won ? '🎉 You Got It!' : '💀 Game Over!';
  t.className = 'result-title ' + (won ? 'win' : 'lose');

  document.getElementById('resultWord').textContent = currentWord;
  document.getElementById('resultHint').textContent = currentHint;
  document.getElementById('editArea').classList.remove('show');
  document.getElementById('editWordInput').value = currentWord;
  document.getElementById('editHintInput').value = currentHint;
  document.getElementById('btnEditToggle').textContent = '✏️ Edit Word';
  editMode = false;

  document.getElementById('overlay').classList.add('show');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

// ── 편집 / 삭제 ──
function toggleEdit() {
  editMode = !editMode;
  document.getElementById('editArea').classList.toggle('show', editMode);
  document.getElementById('btnEditToggle').textContent = editMode ? '✕ Cancel' : '✏️ Edit Word';
  if (editMode) {
    document.getElementById('editWordInput').value = currentWord;
    document.getElementById('editHintInput').value = currentHint;
  }
}

function saveEdit() {
  const nw = document.getElementById('editWordInput').value.trim().toLowerCase();
  const nh = document.getElementById('editHintInput').value.trim();
  if (!nw) { alert('Word cannot be empty!'); return; }
  words[currentIndex] = { word: nw, hint: nh };
  currentWord = nw; currentHint = nh;
  document.getElementById('resultWord').textContent = nw;
  document.getElementById('resultHint').textContent = nh;
  document.getElementById('editArea').classList.remove('show');
  document.getElementById('btnEditToggle').textContent = '✏️ Edit Word';
  editMode = false;
  showDownloadBanner();
}

function deleteWord() {
  if (!confirm(`"${currentWord}" 를 단어장에서 삭제할까요?`)) return;
  words.splice(currentIndex, 1);
  currentIndex = -1;
  closeOverlay();
  showDownloadBanner();
  newGame(true);
}

// ── 다운로드 ──
function showDownloadBanner() {
  const b = document.getElementById('dlBanner');
  b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), 9000);
}
function hideBanner() { document.getElementById('dlBanner').classList.remove('show'); }
function downloadJSON() {
